{% extends 'base.html' %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="container" style="padding-top: 100px; max-width: 500px; margin: 0 auto;">
    <h2 class="section-title"><span>Вход</span> в систему</h2>
    
    <div style="background: var(--secondary); padding: 2rem; border-radius: 8px; border: 1px solid var(--accent);">
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-primary" style="width: 100%; padding: 1rem; margin-top: 1rem;">Войти</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Нет аккаунта? <a href="{% url 'members:register' %}" style="color: var(--primary);">Зарегистрироваться</a>
        </p>
    </div>
</section>

<style>
    /* Базовые стили для форм Django */
    form p { margin-bottom: 1rem; }
    form label { display: block; margin-bottom: 0.5rem; color: #ccc; }
    form input { width: 100%; padding: 0.8rem; border: 1px solid var(--accent); background: #222; color: white; border-radius: 4px; }
    form input:focus { outline: none; border-color: var(--primary); }
</style>
{% endblock %}
